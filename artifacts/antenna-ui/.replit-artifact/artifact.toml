kind = "web"
previewPath = "/"
title = "Antenna Array Optimizer"
version = "1.0.0"
id = "artifacts/antenna-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25523

[services.development]
run = "pnpm --filter @workspace/antenna-ui run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/antenna-ui", "run", "build" ]
publicDir = "artifacts/antenna-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25523"
BASE_PATH = "/"
